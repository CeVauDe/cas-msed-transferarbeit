services:
  meteo-mcp-server:
    build:
      context: ../
      dockerfile: docker/meteo_mcp_server/Dockerfile
    ports:
      - '8081:8081'
    environment:
      SRF_CONSUMER_KEY: ${SRF_CONSUMER_KEY}
      SRF_CONSUMER_SECRET: ${SRF_CONSUMER_SECRET}
      MCP_SERVER_PORT: '8081'
      MCP_SERVER_LOG_LEVEL: INFO
      PYTHONUNBUFFERED: '1'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import socket; s = socket.create_connection(('localhost', 8081), timeout=5); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 3

  meteo-chatbot:
    build:
      context: ../
      dockerfile: docker/meteo_chatbot/Dockerfile
    ports:
      - '7860:7860'
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MCP_SERVER_URL: http://meteo-mcp-server:8081/mcp
      GRADIO_PORT: '7860'
    depends_on:
      meteo-mcp-server:
        condition: service_healthy
