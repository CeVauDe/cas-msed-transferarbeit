services:
  chatbot:
    build:
      context: .
      dockerfile: docker/chatbot/Dockerfile
    container_name: mcp-chatbot
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - MCP_SERVER_URL=http://mcp-server:8080/mcp
    volumes:
      - ./apps/chatbot/src:/app/apps/chatbot/src:ro
    stdin_open: true
    tty: true
    restart: on-failure
    depends_on:
      mcp-server:
        condition: service_healthy

  mcp-server:
    build:
      context: .
      dockerfile: docker/mcp_server/Dockerfile
    container_name: mcp-server
    ports:
      - "8080:8080"
    environment:
      - MCP_SERVER_PORT=8080
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_TRANSPORT=streamable-http
      - MCP_SERVER_LOG_LEVEL=INFO
      - MCP_DEBUG_ENRICHMENT=false
      - MCP_DATA_PARQUET_PATH=/app/apps/mcp_server/data/Jahresbericht21_SRF-DS.normalized.parquet
    volumes:
      - ./apps/mcp_server/src:/app/apps/mcp_server/src:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8080), 2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
